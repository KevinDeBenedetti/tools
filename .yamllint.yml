extends: default
rules:
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false  # allows 'on:' as a GitHub Actions trigger key
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  document-start: disable  # GitHub Actions files don't use '---'
