name: CI - CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-shell.yml@main
    with:
      run-shellcheck: true
      shellcheck-severity: warning
      shellcheck-exclude-paths: '*/test_helper/*'
      run-actionlint: true
      actionlint-paths: .github/workflows/
      run-bats: true
      bats-tests-dir: tests/github/
      bats-submodules: true
      run-docker: false

  security:
    needs: ci
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
    secrets: inherit
