name: Release

on:
  push:
    branches:
      - main

jobs:
  security:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
    secrets: inherit

  release:
    permissions:
      contents: write
    uses: KevinDeBenedetti/github-workflows/.github/workflows/release.yml@main
    with:
      config-file: .github/release/release-please-config.json
      manifest-file: .github/release/.release-please-manifest.json
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
