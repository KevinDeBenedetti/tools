name: CI - CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-shell.yml@main
    with:
      run-shellcheck: true
      shellcheck-severity: warning
      shellcheck-exclude-paths: '*/test_helper/*'
      run-actionlint: true
      actionlint-paths: .github/workflows/
      run-bats: true
      bats-tests-dir: tests/github/
      bats-submodules: true
      run-docker: false
      run-link-check: true
      link-check-paths: 'docs/'

  security:
    needs: ci
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
    secrets: inherit

  # ── Dispatch docs rebuild ──────────────────────────────────────────────────
  dispatch:
    name: Dispatch docs rebuild
    needs: [ci, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/dispatch-docs.yml@main
    secrets:
      dispatch-token: ${{ secrets.PAGES_DISPATCH_TOKEN }}
